name: Deploy to Staging (Kubernetes)
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Mock deploy steps
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Update KubeConfig
        run: aws eks update-kubeconfig --region us-east-1 --name agm-staging-cluster
        
      - name: Deploy API via Helm
        run: |
          helm upgrade --install agm-api ./infra/helm_skeleton -f ./infra/helm_skeleton/values-staging.yaml
